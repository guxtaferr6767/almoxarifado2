<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado v0.0.2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav-abas">
        <button class="tab-btn active" onclick="abrirAba('estoque')">Estoque</button>
        <button class="tab-btn" onclick="abrirAba('cadastro')">Cadastrar Item</button>
    </div>

    <div class="container">
        <!-- ABA: ESTOQUE -->
        <div id="estoque" class="aba-conteudo active">
            <h1>📦 Itens no Estoque</h1>
            <input type="text" id="inputBusca" placeholder="Pesquisar item...">
            <table>
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Quantidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaItens"></tbody>
            </table>
        </div>

        <!-- ABA: CADASTRO -->
        <div id="cadastro" class="aba-conteudo">
            <h1>📝 Novo Cadastro</h1>
            <div class="formulario-cadastro">
                <label>Nome do Produto:</label>
                <input type="text" id="nomeItem" placeholder="Ex: Papel A4">
                
                <label>Quantidade Inicial:</label>
                <input type="number" id="qtdItem" placeholder="0">
                
                <button id="btnAdicionar">Finalizar Cadastro</button>
            </div>
        </div>
    </div>

    <span class="versao-site">v0.0.2</span>
    <script src="script.js"></script>
</body>
</html>
